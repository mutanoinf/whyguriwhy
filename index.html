`;
    // ==========================================


    // --- 아이콘 컴포넌트 ---
    const IconProps = { xmlns: "http://www.w3.org/2000/svg", viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" };
    const ImageIcon = ({ className }) => <svg {...IconProps} className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>;
    const Play = ({ className }) => <svg {...IconProps} className={className}><polygon points="5 3 19 12 5 21 5 3"/></svg>;
    const CheckCircle2 = ({ className }) => <svg {...IconProps} className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;
    const XCircle = ({ className }) => <svg {...IconProps} className={className}><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>;
    const RefreshCw = ({ className }) => <svg {...IconProps} className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
    const Info = ({ className }) => <svg {...IconProps} className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
    const HelpCircle = ({ className }) => <svg {...IconProps} className={className}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>;

    // --- 유틸리티 및 비즈니스 로직 ---
    const getCategoryForNumber = (numStr) => {
      const num = parseInt(numStr, 10);
      if ((num >= 1 && num <= 41) || num === 101) return "복부";
      if ((num >= 42 && num <= 51) || (num >= 102 && num <= 110)) return "흉부";
      if ((num >= 62 && num <= 81) || (num >= 111 && num <= 122)) return "두경부";
      if (num >= 82 && num <= 91) return "근골격";
      if (num >= 92 && num <= 100) return "조영";
      if (num >= 123 && num <= 127) return "유방";
      return "미분류";
    };

    const getQuestionId = (rawId) => {
      if (rawId.startsWith("96_")) return rawId; 
      return rawId.split('_')[0]; 
    };

    const convertDriveUrl = (url) => {
      const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if (match && match[1]) {
        return `https://drive.google.com/file/d/${match[1]}/preview`;
      }
      return url;
    };

    const parseCSVRow = (str) => {
      const result = [];
      let cell = '';
      let inQuote = false;
      for (let i = 0; i < str.length; i++) {
        const char = str[i];
        if (char === '"') {
          inQuote = !inQuote;
        } else if (char === ',' && !inQuote) {
          result.push(cell.trim());
          cell = '';
        } else {
          cell += char;
        }
      }
      result.push(cell.trim());
      return result;
    };

    const parseCSV = (csvText) => {
      // 빈 줄이거나 별표(*)로 시작하는 안내용 텍스트 줄은 무시
      const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== '' && !line.trim().startsWith('*'));
      const questionsMap = {};

      lines.forEach(line => {
        const row = parseCSVRow(line);
        if (row.length >= 3) {
          const rawId = row[0];
          const answer = row[1];
          const rawUrl = row[2];

          const qId = getQuestionId(rawId);
          const category = getCategoryForNumber(qId.replace('_1', '').replace('_2', '')); 

          if (!questionsMap[qId]) {
            questionsMap[qId] = {
              id: qId,
              category: category,
              answer: answer,
              images: [],
            };
          }
          questionsMap[qId].images.push(convertDriveUrl(rawUrl));
        }
      });

      return Object.values(questionsMap);
    };

    const getRadiologyFindings = (diagnosis) => {
      const diagLower = diagnosis.toLowerCase();
      if (diagLower.includes('cirrhosis')) return "간 표면의 결절성 변화, 간 실질의 거친 에코/음영, 비장비대, 복수, 측부 순환(varices) 등을 확인하세요.";
      if (diagLower.includes('cysts') || diagLower.includes('cyst')) return "내부에 에코나 음영이 없는(anechoic/low attenuation) 둥근 낭성 병변, 초음파상 후방 음향 증강(posterior acoustic enhancement) 소견이 특징적입니다.";
      if (diagLower.includes('hemangioma')) return "초음파상 고에코 결절, 조영증강 시 주변부에서 결절성 조영증강이 시작되어 중심으로 차오르는(peripheral nodular enhancement with progressive centripetal fill-in) 양상을 보입니다.";
      if (diagLower.includes('abscess')) return "두꺼운 벽을 가지며 조영증강되는 낭성 병변, 내부에 공기 방울이나 파편(debris), 주변 부종이 보일 수 있습니다.";
      if (diagLower.includes('hepatocellular carcinoma') || diagLower.includes('hcc')) return "동맥기에서 강한 조영증강(arterial hyperenhancement)을 보이고, 지연기에서 조영제가 빠져나가는(washout) 양상이 전형적입니다.";
      if (diagLower.includes('infarction')) return "초기에는 세포독성 부종으로 인해 확산강조영상(DWI)에서 고신호, ADC map에서 저신호로 보이며, 혈관 영역을 따릅니다.";
      if (diagLower.includes('hematoma') || diagLower.includes('sdh') || diagLower.includes('edh')) return "출혈 시기에 따라 신호 강도가 달라집니다. 급성기 CT에서 고음영으로 보이며, 경막하 혈종(SDH)은 초승달 모양, 경막외 혈종(EDH)은 볼록 렌즈 모양을 띱니다.";
      if (diagLower.includes('stone') || diagLower.includes('calculus')) return "초음파상 강한 고에코 병변과 후방 음향 섀도잉(posterior acoustic shadowing)이 특징입니다. CT에서는 고음영 결절로 보입니다.";
      if (diagLower.includes('av malformation') || diagLower.includes('avm')) return "비정상적으로 팽창된 혈관들의 군집(nidus)이 관찰되며, MRI T2 강조영상에서 특징적인 신호소실(flow void)이 보일 수 있습니다.";
      if (diagLower.includes('ramsay-hunt') || diagLower.includes('neuritis')) return "해당 뇌신경(예: 안면신경, 삼차신경 등)의 비후 및 뚜렷한 조영증강 소견이 특징적으로 관찰됩니다.";
      if (diagLower.includes('stent') || diagLower.includes('ptbd')) return "관형태의 금속성/고음영 구조물이 위치에 맞게 거치되었는지, 개통성이 유지되는지 확인합니다.";
      return "해당 병변의 크기, 모양, 경계, 내부 에코/음영/신호강도 및 조영증강 양상을 주의 깊게 평가하고 주변 침범 여부를 확인하세요.";
    };

    const shuffleArray = (array) => {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    };

    // --- 메인 앱 컴포넌트 ---
    function App() {
      const [questions, setQuestions] = useState([]);
      const [categories, setCategories] = useState([]);
      const [isQuizStarted, setIsQuizStarted] = useState(false);
      const [selectedCategory, setSelectedCategory] = useState('All');
      const [quizQueue, setQuizQueue] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [userAnswer, setUserAnswer] = useState('');
      const [showResult, setShowResult] = useState(false);
      const [score, setScore] = useState(0);
      const [isFinished, setIsFinished] = useState(false);

      // 앱 실행 시 내장된 CSV 데이터를 바로 불러옵니다.
      useEffect(() => {
        const parsedQuestions = parseCSV(embeddedCSVData);
        if (parsedQuestions.length > 0) {
          setQuestions(parsedQuestions);
          const uniqueCategories = ['All', ...new Set(parsedQuestions.map(q => q.category))];
          setCategories(uniqueCategories);
        }
      }, []);

      const startQuiz = () => {
        let filtered = questions;
        if (selectedCategory !== 'All') {
          filtered = questions.filter(q => q.category === selectedCategory);
        }
        if (filtered.length === 0) return alert("문제가 없습니다.");
        setQuizQueue(shuffleArray(filtered));
        setCurrentIndex(0);
        setScore(0);
        setIsQuizStarted(true);
        setIsFinished(false);
        setUserAnswer('');
        setShowResult(false);
      };

      const handleShowAnswer = (e) => {
        e.preventDefault();
        setShowResult(true);
      };

      const handleSelfGrade = (isCorrect) => {
        if (isCorrect) setScore(prev => prev + 1);
        if (currentIndex + 1 >= quizQueue.length) {
          setIsFinished(true);
        } else {
          setCurrentIndex(prev => prev + 1);
          setUserAnswer('');
          setShowResult(false);
        }
      };

      const resetApp = () => {
        setIsQuizStarted(false);
        setIsFinished(false);
        setQuizQueue([]);
      };

      const renderStartScreen = () => (
        <div className="flex flex-col items-center justify-center min-h-[85vh] px-4">
          <div className="bg-white p-8 md:p-10 rounded-3xl shadow-xl max-w-lg w-full text-center space-y-8">
            <div className="bg-indigo-50 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-2">
              <ImageIcon className="w-12 h-12 text-indigo-600" />
            </div>
            <div>
              <h1 className="text-3xl font-extrabold text-gray-900 mb-2">영상의학 문제 은행</h1>
              <p className="text-gray-500">데이터가 내장된 독립 실행형 앱입니다.</p>
            </div>

            {questions.length === 0 ? (
              <div className="border-2 border-dashed border-red-300 rounded-2xl p-8 bg-red-50 text-red-700">
                <p className="font-bold text-lg mb-2">데이터를 불러오지 못했습니다.</p>
                <p className="text-sm">소스 코드 파일(HTML) 상단의 <code>embeddedCSVData</code> 변수에 전체 시트 데이터를 정확히 붙여넣어 주세요.</p>
              </div>
            ) : (
              <div className="space-y-6">
                <div className="bg-green-50 text-green-800 p-4 rounded-xl flex items-center justify-center border border-green-200 font-bold">
                  <CheckCircle2 className="w-6 h-6 mr-2 text-green-600" />
                  총 {questions.length}개 문항 성공적으로 로드됨!
                </div>
                <div className="text-left space-y-2">
                  <label className="block text-sm font-bold text-gray-700 ml-1">학습할 부위 선택</label>
                  <select value={selectedCategory} onChange={(e) => setSelectedCategory(e.target.value)} className="w-full p-4 border-2 border-gray-200 rounded-xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 font-medium text-gray-800 outline-none transition-all cursor-pointer">
                    {categories.map(cat => (
                      <option key={cat} value={cat}>{cat === 'All' ? '🎯 전 범위 모의고사 (랜덤)' : `📁 ${cat} 영역만 학습`}</option>
                    ))}
                  </select>
                </div>
                <button onClick={startQuiz} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-4 rounded-xl font-bold text-xl inline-flex items-center justify-center transition-all hover:shadow-lg hover:scale-[1.02]">
                  <Play className="w-6 h-6 mr-2 fill-current" />
                  학습 시작하기
                </button>
              </div>
            )}
          </div>
        </div>
      );

      const renderQuizScreen = () => {
        const currentQuestion = quizQueue[currentIndex];
        return (
          <div className="max-w-5xl mx-auto p-4 py-6">
            <div className="bg-white rounded-2xl shadow-sm p-5 mb-6 flex flex-col sm:flex-row sm:items-center justify-between border border-gray-200 gap-4">
              <div className="flex items-center gap-3">
                <span className="bg-indigo-100 text-indigo-800 px-4 py-1.5 rounded-lg font-bold text-sm tracking-wide">{currentQuestion.category}</span>
                <span className="text-gray-400 text-sm font-medium">문제 {currentIndex + 1}</span>
              </div>
              <div className="flex-1 max-w-xs w-full">
                <div className="flex justify-between text-xs font-bold text-gray-500 mb-1.5">
                  <span>진행률</span>
                  <span>{Math.round(((currentIndex + 1) / quizQueue.length) * 100)}%</span>
                </div>
                <div className="w-full bg-gray-100 rounded-full h-2.5 overflow-hidden">
                  <div className="bg-indigo-600 h-full rounded-full transition-all duration-500 ease-out" style={{ width: `${((currentIndex + 1) / quizQueue.length) * 100}%` }}></div>
                </div>
              </div>
            </div>

            <div className="bg-gray-900 rounded-3xl p-6 mb-6 flex flex-wrap gap-6 justify-center items-center min-h-[450px] shadow-inner relative overflow-hidden">
              {currentQuestion.images.map((url, idx) => (
                 <div key={idx} className="relative w-full max-w-3xl h-[550px]">
                    <iframe 
                      src={url} 
                      title={`Radiology ${currentQuestion.id} - Image ${idx+1}`} 
                      className="w-full h-full rounded-xl shadow-2xl bg-black border border-gray-700"
                      allow="autoplay"
                    ></iframe>
                 </div>
              ))}
            </div>

            <div className="bg-white rounded-3xl shadow-lg p-6 md:p-8 border border-gray-100">
              {!showResult ? (
                <div className="space-y-4">
                  <label className="block text-gray-600 font-semibold mb-2 flex items-center">
                    <HelpCircle className="w-5 h-5 mr-2 text-indigo-400" />
                    어떤 진단 혹은 시술(Intervention)로 보이시나요?
                  </label>
                  <form onSubmit={handleShowAnswer} className="flex flex-col sm:flex-row gap-4">
                    <input type="text" value={userAnswer} onChange={(e) => setUserAnswer(e.target.value)} placeholder="머릿속으로 생각한 후 바로 정답을 확인하셔도 됩니다." className="flex-1 p-4 bg-gray-50 border border-gray-300 rounded-2xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 text-lg outline-none transition-all" autoFocus />
                    <button type="submit" className="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-4 rounded-2xl font-bold text-lg whitespace-nowrap transition-colors shadow-md">정답 확인하기</button>
                  </form>
                </div>
              ) : (
                <div className="space-y-8">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="bg-gray-50 rounded-2xl p-6 border border-gray-200">
                      <h3 className="text-sm font-bold text-gray-500 mb-3 uppercase tracking-wider">내가 생각한 답</h3>
                      <div className="text-xl font-medium text-gray-800 break-words">{userAnswer || <span className="text-gray-400 italic">(입력하지 않음)</span>}</div>
                    </div>
                    <div className="bg-indigo-50 rounded-2xl p-6 border border-indigo-200 shadow-sm relative overflow-hidden">
                      <div className="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>
                      <h3 className="text-sm font-bold text-indigo-500 mb-3 uppercase tracking-wider flex items-center justify-between">
                        실제 정답 (진단명)
                        <button onClick={() => navigator.clipboard.writeText(currentQuestion.answer)} className="text-xs text-indigo-600 bg-indigo-100 hover:bg-indigo-200 px-3 py-1 rounded-full font-semibold transition-colors">복사</button>
                      </h3>
                      <div className="text-xl font-extrabold text-indigo-900 break-words leading-snug">{currentQuestion.answer}</div>
                    </div>
                  </div>

                  <div className="bg-amber-50 border border-amber-200 rounded-2xl p-6 shadow-sm">
                    <h3 className="text-base font-bold text-amber-800 mb-3 flex items-center">
                      <Info className="w-5 h-5 mr-2" /> 핵심 영상의학적 소견 리마인드
                    </h3>
                    <p className="text-amber-900 leading-relaxed font-medium">{getRadiologyFindings(currentQuestion.answer)}</p>
                  </div>

                  <div className="pt-4 border-t border-gray-100">
                    <h4 className="text-center font-bold text-gray-500 mb-4">스스로 채점해주세요</h4>
                    <div className="flex flex-col sm:flex-row justify-center gap-4">
                      <button onClick={() => handleSelfGrade(true)} className="flex-1 sm:flex-none flex items-center justify-center bg-green-100 hover:bg-green-200 text-green-700 border border-green-300 px-8 py-4 rounded-2xl font-bold text-lg transition-transform hover:scale-105">
                        <CheckCircle2 className="w-6 h-6 mr-2" /> 맞았습니다
                      </button>
                      <button onClick={() => handleSelfGrade(false)} className="flex-1 sm:flex-none flex items-center justify-center bg-red-100 hover:bg-red-200 text-red-700 border border-red-300 px-8 py-4 rounded-2xl font-bold text-lg transition-transform hover:scale-105">
                        <XCircle className="w-6 h-6 mr-2" /> 틀렸습니다
                      </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      };

      const renderResultScreen = () => (
        <div className="flex flex-col items-center justify-center min-h-[85vh] px-4">
          <div className="bg-white p-10 md:p-12 rounded-3xl shadow-2xl max-w-md w-full text-center space-y-8">
            <div className="bg-green-100 w-28 h-28 rounded-full flex items-center justify-center mx-auto shadow-inner">
              <CheckCircle2 className="w-16 h-16 text-green-600" />
            </div>
            <div>
              <h2 className="text-3xl font-extrabold text-gray-900 mb-4">학습 완료!</h2>
              <p className="text-gray-500 text-lg mb-6"><b>{selectedCategory === 'All' ? '전체 영역' : selectedCategory}</b>의 모든 문항을 확인하셨습니다.</p>
              <div className="bg-gray-50 rounded-2xl p-6 border border-gray-100">
                <div className="text-sm font-bold text-gray-500 uppercase tracking-wider mb-2">나의 성적</div>
                <div className="text-5xl font-black text-indigo-600 mb-2">
                  {score} <span className="text-2xl text-gray-400 font-bold">/ {quizQueue.length}</span>
                </div>
                <div className="text-sm text-gray-500 font-medium">정답률: {Math.round((score / quizQueue.length) * 100)}%</div>
              </div>
            </div>
            <button onClick={resetApp} className="w-full bg-gray-900 hover:bg-black text-white px-6 py-4 rounded-xl font-bold text-lg inline-flex items-center justify-center transition-transform hover:scale-105 shadow-xl">
              <RefreshCw className="w-5 h-5 mr-3" />
              처음 화면으로 돌아가기
            </button>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen pb-10">
          <header className="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
            <div className="font-extrabold text-xl text-indigo-900 flex items-center tracking-tight">
              <ImageIcon className="w-6 h-6 mr-2 text-indigo-600" /> RadQuiz Pro
            </div>
            {isQuizStarted && !isFinished && (
              <button onClick={resetApp} className="text-sm font-bold text-gray-500 hover:text-red-500 transition-colors bg-gray-100 hover:bg-red-50 px-4 py-2 rounded-lg">
                학습 강제 종료
              </button>
            )}
          </header>
          <main>
            {!isQuizStarted && !isFinished && renderStartScreen()}
            {isQuizStarted && !isFinished && renderQuizScreen()}
            {isFinished && renderResultScreen()}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
